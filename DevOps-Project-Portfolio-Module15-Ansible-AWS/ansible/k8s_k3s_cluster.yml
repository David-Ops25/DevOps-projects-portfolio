- name: Install K3s server on node1
  hosts: name_configuration_management_ansible_node1
  become: true
  tasks:
    - name: Install K3s server
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Read node token
      command: cat /var/lib/rancher/k3s/server/node-token
      register: token

    - name: Save token for other plays
      set_fact:
        k3s_token: "{{ token.stdout }}"

- name: Install K3s agent on node2 and join cluster
  hosts: name_configuration_management_ansible_node2
  become: true
  vars:
    k3s_server_ip: "{{ hostvars[groups['name_configuration_management_ansible_node1'][0]].ansible_host }}"
    k3s_url: "https://{{ k3s_server_ip }}:6443"
    k3s_token: "{{ hostvars[groups['name_configuration_management_ansible_node1'][0]].k3s_token }}"
  tasks:
    - name: Install K3s agent and join cluster
      shell: curl -sfL https://get.k3s.io | K3S_URL={{ k3s_url }} K3S_TOKEN={{ k3s_token }} sh -
      args:
        creates: /usr/local/bin/k3s-agent
