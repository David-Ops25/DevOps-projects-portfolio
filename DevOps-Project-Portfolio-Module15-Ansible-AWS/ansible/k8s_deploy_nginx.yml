- name: Deploy nginx to K3s (Module 15 demo)
  hosts: name_configuration_management_ansible_node1
  become: true
  tasks:
    - name: Create namespace
      shell: k3s kubectl create ns module15 --dry-run=client -o yaml | k3s kubectl apply -f -

    - name: Deploy nginx + NodePort service
      shell: |
        cat <<MANIFEST | k3s kubectl apply -n module15 -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: nginx
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: nginx
          template:
            metadata:
              labels:
                app: nginx
            spec:
              containers:
              - name: nginx
                image: nginx:latest
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: nginx-svc
        spec:
          type: NodePort
          selector:
            app: nginx
          ports:
          - port: 80
            targetPort: 80
            nodePort: 30080
        MANIFEST

    - name: Show resources
      shell: k3s kubectl -n module15 get deploy,svc,pods -o wide
