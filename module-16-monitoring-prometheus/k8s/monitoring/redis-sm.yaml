apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-redis-exporter
  namespaceSelector:
    matchNames:
      - apps
  endpoints:
    - port: redis-exporter
      interval: 30s
      scrapeTimeout: 10s
