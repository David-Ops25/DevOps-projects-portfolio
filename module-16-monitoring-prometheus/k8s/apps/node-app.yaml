apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: apps
  labels:
    app: node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: davidangyu/node-monitor:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: node-app
  namespace: apps
  labels:
    app: node-app
spec:
  selector:
    app: node-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
